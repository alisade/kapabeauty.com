baseURL = 'https://labellenailstudio.com'
languageCode = 'en-us'
title = 'La Belle Nail Studio'

enableRobotsTXT = false
buildDrafts = false
buildFuture = false
buildExpired = false

# Single-page site: no sections, taxonomies, or feeds to render.
disableKinds = ["taxonomy", "term", "section", "RSS"]

[minify]
  disableXML = true
  minifyOutput = true

[params]
  env = "production"
  description = "Russian & e-file manicures, gel, and custom nail art in Los Angeles, CA. Book your appointment online."
  author = "La Belle Nail Studio"

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true

[outputs]
  home = ["HTML"]
