baseURL = 'https://labellenailstudio.com'
languageCode = 'en-us'
title = 'La Belle Nail Studio'

enableRobotsTXT = false
buildDrafts = false
buildFuture = false
buildExpired = false

# Single-page site: no sections, taxonomies, or feeds to render.
disableKinds = ["taxonomy", "term", "section", "RSS"]

[minify]
  disableXML = true
  minifyOutput = true

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true

[outputs]
  home = ["HTML"]
