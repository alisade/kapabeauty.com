{{- $s := site.Data.studio -}}
<!DOCTYPE html>
<html lang="{{ site.LanguageCode | default "en-us" }}">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Bookings Admin - {{ $s.name }}</title>
  <meta name="robots" content="noindex, nofollow">
  <link rel="icon" href="/favicon.ico">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root{
      --bg:#f3ede4; --card:#fffdfb; --ink:#2e2823; --muted:#8a7f72; --line:#e7dccd;
      --accent:#8a6f57; --accent-ink:#fffaf3; --err:#a5463c; --ok:#3f7d5b; --radius:14px;
      --serif:"Cormorant Garamond",Georgia,serif; --sans:"Inter",-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
    }
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:var(--sans);color:var(--ink);background:var(--bg);line-height:1.5;-webkit-font-smoothing:antialiased}
    .wrap{max-width:760px;margin:0 auto;padding:28px 18px 64px}
    header.top{display:flex;align-items:baseline;justify-content:space-between;gap:12px;margin-bottom:18px}
    .title{font-family:var(--serif);font-size:26px;font-weight:600}
    .title small{display:block;font-family:var(--sans);font-size:12px;letter-spacing:1px;text-transform:uppercase;color:var(--accent);font-weight:600}
    a.home{color:var(--muted);font-size:13px;text-decoration:none} a.home:hover{color:var(--ink)}

    .card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);box-shadow:0 3px 14px rgba(70,55,40,.05)}
    .cfg{padding:16px;display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:18px}
    .cfg .full{grid-column:1 / -1}
    .field label{display:block;font-size:12px;font-weight:600;color:var(--muted);margin-bottom:5px}
    .field input{width:100%;border:1px solid var(--line);border-radius:10px;padding:11px 12px;font:inherit;font-size:14px;background:#fff;color:var(--ink)}
    .field input:focus{outline:0;border-color:var(--accent)}
    .row{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
    .btn{display:inline-flex;align-items:center;justify-content:center;gap:7px;padding:11px 18px;background:var(--accent);color:var(--accent-ink);border:0;border-radius:10px;font:inherit;font-weight:600;font-size:14px;cursor:pointer}
    .btn:hover{opacity:.93}.btn[disabled]{opacity:.5;cursor:not-allowed}
    .btn.ghost{background:none;color:var(--muted);border:1px solid var(--line)}
    .btn.danger{background:none;color:var(--err);border:1px solid #e3c9c4;padding:7px 12px;font-size:12.5px;border-radius:8px}
    .btn.danger:hover{background:var(--err);color:#fff;border-color:var(--err)}
    .btn.sm{padding:7px 12px;font-size:12.5px;border-radius:8px}
    .rowbtns{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-top:12px}

    .toolbar{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:14px}
    .toolbar .grow{flex:1}
    .muted{color:var(--muted);font-size:13px}
    .msg{padding:10px 0;font-size:14px}.msg.err{color:var(--err)}

    .daygroup{margin-top:18px}
    .dayhead{font-family:var(--serif);font-size:19px;font-weight:600;margin-bottom:8px;display:flex;justify-content:space-between;align-items:baseline}
    .dayhead .cnt{font-family:var(--sans);font-size:12px;color:var(--muted);font-weight:600}
    .bk{display:flex;gap:14px;align-items:flex-start;padding:14px 16px;border-top:1px solid var(--line)}
    .bk:first-child{border-top:0}
    .bk .time{flex:0 0 92px;font-weight:600;font-size:14px}
    .bk .time .dur{display:block;color:var(--muted);font-size:12px;font-weight:500}
    .bk .info{flex:1;min-width:0}
    .bk .svc{font-weight:600;font-size:14.5px}
    .bk .who{color:var(--muted);font-size:13px;margin-top:2px}
    .bk .who a{color:var(--accent);text-decoration:none}
    .bk .notes{color:var(--muted);font-size:12.5px;margin-top:4px;font-style:italic}
    .bk .actions{flex:0 0 auto}
    .bk.cancelled{opacity:.5}
    .pill{display:inline-block;font-size:11px;font-weight:600;color:var(--err);border:1px solid #e3c9c4;border-radius:999px;padding:1px 8px;margin-left:6px}
    .empty{padding:36px 16px;text-align:center;color:var(--muted)}
    .tabs{display:flex;gap:8px;margin-bottom:14px}
    .tab-on{background:var(--accent);color:var(--accent-ink);border-color:var(--accent)}
    .sub{display:flex;gap:14px;align-items:center;padding:13px 16px;border-top:1px solid var(--line)}
    .sub:first-child{border-top:0}
    .sub .em{flex:1;min-width:0;font-weight:600;font-size:14px;word-break:break-all}
    .sub .em a{color:var(--accent);text-decoration:none}
    .sub .nm{color:var(--muted);font-size:13px;font-weight:500}
    .sub .jn{flex:0 0 auto;color:var(--muted);font-size:12.5px;text-align:right}
    .sub.unsub{opacity:.5}
    .badge{display:inline-block;font-size:11px;font-weight:600;border-radius:999px;padding:1px 8px;margin-left:6px}
    .badge.off{color:var(--err);border:1px solid #e3c9c4}
    .setup-sec{margin-bottom:20px}
    .setup-sec h3{font-family:var(--serif);font-size:20px;font-weight:600;margin-bottom:10px;display:flex;justify-content:space-between;align-items:baseline}
    .svcrow{padding:14px 16px;border-top:1px solid var(--line)}
    .svcrow:first-child{border-top:0}
    .svcrow.off{opacity:.55}
    .fgrid{display:grid;grid-template-columns:1fr 1fr;gap:8px 10px}
    .fgrid .wide{grid-column:1 / -1}
    .fld label{display:block;font-size:11px;font-weight:600;color:var(--muted);margin:0 0 3px}
    .fld input,.fld select{width:100%;border:1px solid var(--line);border-radius:8px;padding:9px 10px;font:inherit;font-size:14px;background:#fff;color:var(--ink)}
    .fld input:focus,.fld select:focus{outline:0;border-color:var(--accent)}
    .svcrow .rowbtns{display:flex;gap:8px;margin-top:10px;align-items:center}
    .hrow{display:flex;gap:10px;align-items:center;padding:9px 16px;border-top:1px solid var(--line);flex-wrap:wrap}
    .hrow:first-child{border-top:0}
    .hrow .dow{flex:0 0 46px;font-weight:600;font-size:14px}
    .hrow input[type=time]{border:1px solid var(--line);border-radius:8px;padding:8px 9px;font:inherit;font-size:14px}
    .hrow label.cl{display:flex;gap:5px;align-items:center;color:var(--muted);font-size:13px;margin-left:auto}
    .savedok{color:var(--ok);font-size:13px;font-weight:600}
    .peoplenav{display:flex;gap:8px;flex-wrap:wrap;padding:14px 16px;border-bottom:1px solid var(--line)}
    .pchip{padding:7px 14px;border:1px solid var(--line);border-radius:999px;background:#fff;color:var(--muted);font:inherit;font-size:13px;font-weight:600;cursor:pointer}
    .pchip:hover{border-color:var(--accent)}
    .pchip.on{background:var(--accent);color:var(--accent-ink);border-color:var(--accent)}
    .hide{display:none}
    .spin{width:16px;height:16px;border:2px solid rgba(255,255,255,.5);border-top-color:#fff;border-radius:50%;display:inline-block;animation:sp .7s linear infinite;vertical-align:-2px}
    @keyframes sp{to{transform:rotate(360deg)}}
  </style>
</head>
<body>
  <div class="wrap">
    <header class="top">
      <div class="title">Bookings <small>{{ $s.name }}</small></div>
      <a class="home" href="/">&larr; Site</a>
    </header>

    <!-- config / sign in -->
    <div class="card cfg" id="cfg">
      <div class="full" style="text-align:center;padding:4px 0 2px">
        <a class="btn" id="goLogin" href="/login/" style="text-decoration:none;display:inline-flex">Sign in with your account</a>
        <div class="muted" style="font-size:12px;margin-top:8px">Recommended. Or use the admin token below (break-glass).</div>
      </div>
      <div class="field full">
        <label>Booking API URL</label>
        <input id="apiUrl" placeholder="https://api.labellenailstudio.com" autocomplete="off">
      </div>
      <div class="field full">
        <label>Admin token</label>
        <input id="token" type="password" placeholder="your ADMIN_TOKEN" autocomplete="off">
      </div>
      <div class="row full">
        <button class="btn" id="loadBtn">Load bookings</button>
        <button class="btn ghost" id="signout">Sign out</button>
        <span class="muted" id="cfgMsg"></span>
      </div>
    </div>

    <!-- tabs (after sign in) -->
    <div class="tabs hide" id="tabs">
      <button class="btn ghost tab-on" id="tabBookings">Bookings</button>
      <button class="btn ghost" id="tabSignups">Signups</button>
      <button class="btn ghost" id="tabSetup">Setup</button>
      <button class="btn ghost" id="tabAccounts">Techs/Accounts</button>
      <button class="btn ghost" id="tabPromos">Promos</button>
      <span style="flex:1"></span>
      <button class="btn ghost" id="refreshBtn" title="Reload this tab's data from the server">Refresh</button>
    </div>

    <!-- bookings toolbar -->
    <div class="toolbar hide" id="toolbar">
      <label class="muted" for="dateFilter">View day:</label>
      <input class="field" id="dateFilter" type="date" style="padding:9px 10px;border:1px solid var(--line);border-radius:8px;font:inherit">
      <button class="btn ghost" id="upcoming">Upcoming</button>
    </div>

    <!-- signups toolbar -->
    <div class="toolbar hide" id="subToolbar">
      <button class="btn ghost" id="subCsv">Download CSV</button>
    </div>

    <!-- setup toolbar -->
    <div class="toolbar hide" id="setupToolbar">
      <span class="muted">Changes go live within ~1 minute.</span>
    </div>

    <!-- accounts toolbar -->
    <div class="toolbar hide" id="acctToolbar">
      <span class="muted">Technicians &amp; admins -- logins for /login</span>
    </div>

    <!-- promos toolbar -->
    <div class="toolbar hide" id="promoToolbar">
      <span class="muted">Discount codes applied at checkout</span>
    </div>

    <div id="msg" class="msg"></div>
    <div id="list"></div>
  </div>

  <script>
  (function(){
    var DEFAULT_API = "{{ $s.bookingApiURL }}".replace(/\/+$/,"");
    var el=function(id){return document.getElementById(id)};
    var MON=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
    var DOW=["Sunday","Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"];

    // Prefer the configured API domain (needed for the same-site session cookie);
    // fall back to any saved value. Token is only for break-glass ADMIN_TOKEN use.
    el("apiUrl").value = DEFAULT_API || localStorage.getItem("lb_api") || "";
    el("token").value  = localStorage.getItem("lb_token") || "";
    var cookieAuth = false; // true once an admin session cookie is confirmed

    function api(){ return el("apiUrl").value.trim().replace(/\/+$/,""); }
    function tok(){ return el("token").value.trim(); }
    function hdr(){ var t=tok(); return t ? { "Authorization":"Bearer "+t } : {}; }
    // All admin calls: send the session cookie (credentials) AND a bearer token if present.
    function authFetch(url, opts){ opts=opts||{}; opts.credentials="include"; opts.headers=Object.assign({}, opts.headers||{}, hdr()); return fetch(url, opts); }
    function authed(){ return cookieAuth || !!tok(); }

    function minLabel(m){ var h=Math.floor(m/60),mm=m%60,ap=h>=12?"PM":"AM",h12=h%12||12; return h12+":"+String(mm).padStart(2,"0")+" "+ap; }
    function durLabel(m){ var h=Math.floor(m/60),mm=m%60; return (h?h+"h ":"")+(mm?mm+"m":"").trim()||m+"m"; }
    function fmtDay(ds){ var p=ds.split("-").map(Number),d=new Date(Date.UTC(p[0],p[1]-1,p[2])); return DOW[d.getUTCDay()]+", "+MON[d.getUTCMonth()]+" "+d.getUTCDate()+", "+p[0]; }

    function setMsg(t,err){ var m=el("msg"); m.textContent=t||""; m.className="msg"+(err?" err":""); }

    function load(date){
      if(!api()||!authed()){ el("cfgMsg").textContent="Sign in with your account, or paste an admin token."; el("cfgMsg").style.color="var(--err)"; return; }
      if(tok()){ localStorage.setItem("lb_api", api()); localStorage.setItem("lb_token", tok()); }
      var btn=el("loadBtn"), orig=btn.innerHTML; btn.disabled=true; btn.innerHTML='<span class="spin"></span>';
      setMsg("Loading...");
      var url=api()+"/api/bookings"+(date?("?date="+encodeURIComponent(date)):"");
      authFetch(url).then(function(r){
        if(r.status===401){ throw new Error("Unauthorized -- sign in again or check the admin token."); }
        if(!r.ok){ throw new Error("Request failed ("+r.status+")."); }
        return r.json();
      }).then(function(d){
        btn.disabled=false; btn.innerHTML=orig;
        el("cfg").classList.add("hide");
        el("tabs").classList.remove("hide");
        el("toolbar").classList.remove("hide");
        render(d.bookings||[], date);
      }).catch(function(e){
        btn.disabled=false; btn.innerHTML=orig;
        setMsg(e.message||"Could not load bookings.", true);
        el("list").innerHTML="";
      });
    }

    function render(bookings, date){
      var list=el("list");
      if(!bookings.length){ setMsg(""); list.innerHTML='<div class="card empty">No '+(date?"":"upcoming ")+'bookings'+(date?(" for "+fmtDay(date)):"")+'.</div>'; return; }
      setMsg(bookings.length+" booking"+(bookings.length>1?"s":"")+(date?"":" upcoming"));
      // group by date
      var groups={}, order=[];
      bookings.forEach(function(b){ if(!groups[b.date]){groups[b.date]=[];order.push(b.date);} groups[b.date].push(b); });
      order.sort();
      list.innerHTML="";
      order.forEach(function(ds){
        var g=groups[ds].slice().sort(function(a,b){return a.start_min-b.start_min;});
        var wrap=document.createElement("div"); wrap.className="daygroup";
        var active=g.filter(function(b){return b.status==="confirmed";}).length;
        wrap.innerHTML='<div class="dayhead">'+fmtDay(ds)+'<span class="cnt">'+active+' appt'+(active===1?"":"s")+'</span></div>';
        var card=document.createElement("div"); card.className="card";
        g.forEach(function(b){
          var row=document.createElement("div"); row.className="bk"+(b.status!=="confirmed"?" cancelled":"");
          var phone=(b.phone||"").replace(/[^0-9+]/g,"");
          row.innerHTML=
            '<div class="time">'+minLabel(b.start_min)+'<span class="dur">'+durLabel(b.duration_min)+'</span></div>'+
            '<div class="info"><div class="svc">'+esc(b.service_label)+(b.technician_name?' <span class="muted" style="font-weight:500">with '+esc(b.technician_name)+'</span>':'')+
              (b.paid?(' <span class="badge" style="color:var(--ok);border:1px solid #bcd7c5">paid '+money(b.amount_cents)+'</span>'):'')+
              (b.refunded?' <span class="badge" style="color:var(--accent);border:1px solid var(--line)">refunded</span>':'')+
              (b.status!=="confirmed"?'<span class="pill">cancelled</span>':'')+'</div>'+
            '<div class="who">'+esc(b.name)+' &middot; <a href="tel:'+phone+'">'+esc(b.phone)+'</a>'+(b.email?(' &middot; <a href="mailto:'+esc(b.email)+'">'+esc(b.email)+'</a>'):'')+'</div>'+
            (b.notes?('<div class="notes">'+esc(b.notes)+'</div>'):'')+'</div>'+
            '<div class="actions"></div>';
          if(b.status==="confirmed"){
            var cx=document.createElement("button"); cx.className="btn danger"; cx.textContent="Cancel";
            cx.onclick=function(){ cancel(b, cx); };
            row.querySelector(".actions").appendChild(cx);
          }
          card.appendChild(row);
        });
        wrap.appendChild(card); list.appendChild(wrap);
      });
    }

    function money(c){ c=c||0; return "$"+(c%100===0?(c/100):(c/100).toFixed(2)); }
    function cancel(b, btn){
      var willRefund = b.paid && !b.refunded;
      if(!confirm("Cancel "+b.service_label+" for "+b.name+" on "+fmtDay(b.date)+" at "+minLabel(b.start_min)+"?"+(willRefund?(" This will refund "+money(b.amount_cents)+" to their card."):""))) return;
      btn.disabled=true; btn.innerHTML='<span class="spin" style="border-top-color:var(--err)"></span>';
      authFetch(api()+"/api/cancel",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({id:b.id})})
        .then(function(r){ return r.json().then(function(d){return {ok:r.ok,d:d}}); })
        .then(function(res){ if(!res.ok){ btn.disabled=false; btn.textContent="Cancel"; setMsg((res.d&&res.d.error)||"Could not cancel. Try again.", true); return; } load(el("dateFilter").value||undefined); })
        .catch(function(){ btn.disabled=false; btn.textContent="Cancel"; setMsg("Could not cancel. Try again.", true); });
    }

    function esc(s){ return String(s==null?"":s).replace(/[&<>"']/g,function(c){return {"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c];}); }

    // ---- signups (VIP / marketing list) ----
    function fmtWhen(iso){ if(!iso) return ""; var d=new Date(iso); return MON[d.getMonth()]+" "+d.getDate()+", "+d.getFullYear(); }
    function loadSubs(){
      if(!api()||!authed()){ el("cfgMsg").textContent="Sign in with your account, or paste an admin token."; el("cfgMsg").style.color="var(--err)"; return; }
      setMsg("Loading signups...");
      authFetch(api()+"/api/subscribers").then(function(r){
        if(r.status===401){ throw new Error("Unauthorized -- check the admin token."); }
        if(!r.ok){ throw new Error("Request failed ("+r.status+")."); }
        return r.json();
      }).then(function(d){ renderSubs(d); })
        .catch(function(e){ setMsg(e.message||"Could not load signups.", true); el("list").innerHTML=""; });
    }
    var subSel="__all";
    function renderSubs(d){
      var subs=(d&&d.subscribers)||[], list=el("list"); list.innerHTML=""; setMsg("");
      // Pills: All + each defined campaign (union with any campaign present in the data).
      var defined=(d&&d.campaigns)||[], titleById={}; defined.forEach(function(c){ titleById[c.id]=c.title; });
      var ids=defined.map(function(c){ return c.id; });
      subs.forEach(function(s){ if(ids.indexOf(s.campaign)<0) ids.push(s.campaign); });
      var pills=[{key:"__all",label:"All"}].concat(ids.map(function(id){ return {key:id,label:titleById[id]||id}; }));
      if(!pills.some(function(p){ return p.key===subSel; })) subSel="__all";
      var sec=document.createElement("div"); sec.className="card setup-sec";
      var nav=document.createElement("div"); nav.className="peoplenav";
      var head=document.createElement("div"); head.style.cssText="padding:12px 16px 4px";
      var detail=document.createElement("div");
      function renderList(key){
        subSel=key;
        nav.querySelectorAll(".pchip").forEach(function(x){ x.classList.toggle("on", x.dataset.key===key); });
        var rows=(key==="__all")?subs:subs.filter(function(s){ return s.campaign===key; });
        var active=rows.filter(function(s){ return !s.unsub_at; }).length;
        head.innerHTML='<span class="muted" style="font-size:13px">'+active+' active'+(rows.length>active?(' / '+rows.length+' total'):'')+' signup'+(rows.length===1?'':'s')+'</span>';
        detail.innerHTML="";
        if(!rows.length){ detail.innerHTML='<div class="empty" style="padding:24px">No signups'+(key==="__all"?'':' for this campaign')+' yet.</div>'; return; }
        rows.forEach(function(s){
          var row=document.createElement("div"); row.className="sub"+(s.unsub_at?" unsub":"");
          row.innerHTML='<div class="em"><a href="mailto:'+esc(s.email)+'">'+esc(s.email)+'</a>'+(s.unsub_at?'<span class="badge off">unsubscribed</span>':'')+
            (s.name?('<div class="nm">'+esc(s.name)+'</div>'):'')+(key==="__all"?('<div class="nm" style="font-size:12px">'+esc(titleById[s.campaign]||s.campaign)+'</div>'):'')+'</div>'+
            '<div class="jn">'+fmtWhen(s.created_at)+'</div>';
          detail.appendChild(row);
        });
      }
      pills.forEach(function(p){
        var btn=document.createElement("button"); btn.className="pchip"; btn.type="button"; btn.dataset.key=p.key; btn.textContent=p.label;
        btn.onclick=function(){ renderList(p.key); };
        nav.appendChild(btn);
      });
      sec.appendChild(nav); sec.appendChild(head); sec.appendChild(detail); list.appendChild(sec);
      renderList(subSel);
    }
    function downloadCsv(){
      if(!api()||!authed()) return;
      var btn=el("subCsv"), orig=btn.innerHTML; btn.disabled=true; btn.innerHTML='<span class="spin" style="border-top-color:var(--muted)"></span>';
      var q=(subSel&&subSel!=="__all")?("&campaign="+encodeURIComponent(subSel)):"";
      var fname="labelle-signups"+(subSel&&subSel!=="__all"?("-"+subSel):"")+".csv";
      authFetch(api()+"/api/subscribers?format=csv"+q).then(function(r){ if(!r.ok) throw new Error("failed"); return r.blob(); })
        .then(function(b){ btn.disabled=false; btn.innerHTML=orig; var u=URL.createObjectURL(b), a=document.createElement("a"); a.href=u; a.download=fname; document.body.appendChild(a); a.click(); a.remove(); URL.revokeObjectURL(u); })
        .catch(function(){ btn.disabled=false; btn.innerHTML=orig; setMsg("Could not download CSV.", true); });
    }
    var curTab="bookings";
    function showTab(which){
      curTab=which;
      el("tabBookings").classList.toggle("tab-on", which==="bookings");
      el("tabSignups").classList.toggle("tab-on", which==="signups");
      el("tabSetup").classList.toggle("tab-on", which==="setup");
      el("tabAccounts").classList.toggle("tab-on", which==="accounts");
      el("tabPromos").classList.toggle("tab-on", which==="promos");
      el("toolbar").classList.toggle("hide", which!=="bookings");
      el("subToolbar").classList.toggle("hide", which!=="signups");
      el("setupToolbar").classList.toggle("hide", which!=="setup");
      el("acctToolbar").classList.toggle("hide", which!=="accounts");
      el("promoToolbar").classList.toggle("hide", which!=="promos");
      el("list").innerHTML=""; setMsg("");
      if(which==="bookings") load(el("dateFilter").value||undefined);
      else if(which==="signups") loadSubs();
      else if(which==="setup") loadSetup();
      else if(which==="promos") loadPromos();
      else loadAccounts();
    }

    // ---- setup: services / hours / settings (T00) ----
    var DOWSHORT=["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];
    function minToTime(m){ if(m==null||m==="") return ""; var h=Math.floor(m/60),mm=m%60; return String(h).padStart(2,"0")+":"+String(mm).padStart(2,"0"); }
    function timeToMin(t){ if(!t) return null; var p=t.split(":"); return (+p[0])*60+(+p[1]); }

      var orig=btn.innerHTML; btn.disabled=true; btn.innerHTML='<span class="spin" style="border-top-color:var(--muted)"></span>';
      authFetch(api()+p,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(payload)})
        .then(function(r){ return r.json().then(function(d){return {ok:r.ok,d:d}}); })
        .then(function(res){ btn.disabled=false; btn.innerHTML=orig;
          if(!res.ok){ setRowMsg(msgEl,(res.d&&res.d.error)||"Save failed",true); return; }

    // ---- accounts + technicians (unified) ----
    var ALLSERVICES=[], STUDIOHOURS={}, acctSel=null;
    function loadAccounts(){
      if(!api()||!authed()){ el("cfgMsg").textContent="Sign in with your account, or paste an admin token."; el("cfgMsg").style.color="var(--err)"; return; }
      setMsg("Loading...");
      Promise.all([
        authFetch(api()+"/api/admin/accounts").then(function(r){ if(r.status===401) throw new Error("Unauthorized -- sign in again or check the admin token."); if(!r.ok) throw new Error("Request failed ("+r.status+")."); return r.json(); }),
        authFetch(api()+"/api/admin/technicians").then(function(r){ return r.ok?r.json():{technicians:[]}; }),
        authFetch(api()+"/api/config").then(function(r){ return r.ok?r.json():{services:[]}; })
      ]).then(function(res){ setMsg(""); ALLSERVICES=res[2].services||[]; STUDIOHOURS=res[2].hours||{}; renderAccounts(res[0].accounts||[], res[1].technicians||[]); })
        .catch(function(e){ setMsg(e.message||"Could not load.", true); el("list").innerHTML=""; });
    }
    function renderAccounts(accts, techs){
      var list=el("list"); list.innerHTML="";
      var techById={}; techs.forEach(function(t){ techById[t.id]=t; });
      // ----- add form -----
      var c=document.createElement("div"); c.className="card setup-sec"; c.style.padding="16px";
      c.innerHTML='<h3 style="font-family:var(--serif);font-size:20px;font-weight:600;margin-bottom:10px">Add a person</h3>'+
        '<div class="fgrid">'+
          '<div class="fld"><label>Role</label><select class="a-role"><option value="technician">Technician</option><option value="admin">Admin</option></select></div>'+
          '<div class="fld a-namewrap"><label>Name</label><input class="a-name" placeholder="technician name"></div>'+
          '<div class="fld wide"><label>Email (their login)</label><input class="a-login" type="email" autocapitalize="none" placeholder="name@email.com"></div>'+
          '<div class="fld wide"><label>Temp password (optional)</label><input class="a-pass" placeholder="leave blank to auto-generate"></div>'+
        '</div>'+
        '<div class="rowbtns"><button class="btn a-create">Create</button><span class="a-msg"></span></div>'+
        '<div class="a-temp savedok" style="margin-top:8px;word-break:break-all"></div>';
      var q=function(sel){return c.querySelector(sel)};
      function syncRole(){ q(".a-namewrap").style.display = q(".a-role").value==="technician" ? "" : "none"; }
      q(".a-role").onchange=syncRole; syncRole();
      function afterCreate(res){
        q(".a-login").value=""; q(".a-name").value=""; q(".a-pass").value="";
        q(".a-temp").textContent=(res&&res.tempPassword)?("Temp password for "+res.login+":  "+res.tempPassword+"   (share it securely; they set their own on first sign-in)"):"";
        loadAccounts();
      }
      q(".a-create").onclick=function(){
        var role=q(".a-role").value, login=q(".a-login").value.trim(), name=q(".a-name").value.trim(), pass=q(".a-pass").value||undefined;
        if(!login){ setRowMsg(q(".a-msg"),"Email required",true); return; }
        if(role==="technician" && !name){ setRowMsg(q(".a-msg"),"Name required",true); return; }
        var btn=q(".a-create");
        if(role==="admin"){ postAdmin("/api/admin/accounts",{login:login,role:"admin",password:pass},btn,q(".a-msg"),afterCreate); return; }
        // technician: create the technician record, then their login -- one flow
        var orig=btn.innerHTML; btn.disabled=true; btn.innerHTML='<span class="spin" style="border-top-color:var(--muted)"></span>';
        authFetch(api()+"/api/admin/technician",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({name:name,sort:techs.length+1})})
          .then(function(r){ return r.json(); })
          .then(function(td){
            if(!td||!td.id) throw new Error("Could not create technician");
            return authFetch(api()+"/api/admin/accounts",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({login:login,role:"technician",technician_id:td.id,password:pass})}).then(function(r){ return r.json().then(function(d){ return {ok:r.ok,d:d}; }); });
          })
          .then(function(res){
            btn.disabled=false; btn.innerHTML=orig;
            if(!res.ok){ setRowMsg(q(".a-msg"),(res.d&&res.d.error)||"Technician created, but the login was not.",true); loadAccounts(); return; }
            afterCreate(res.d);
          })
          .catch(function(e){ btn.disabled=false; btn.innerHTML=orig; setRowMsg(q(".a-msg"),e.message||"Error",true); });
      };
      list.appendChild(c);
      // ----- list -----
      var linked={}; accts.forEach(function(a){ if(a.technician_id) linked[a.technician_id]=true; });
      var orphanTechs=techs.filter(function(t){ return !linked[t.id]; });
      // One sub-tab per technician, plus a single "Admins" tab -- so you view one at a time.
      var admins=accts.filter(function(a){ return !a.technician_id; });
      var techEntries=[];
      accts.forEach(function(a){ if(a.technician_id && techById[a.technician_id]) techEntries.push({tech:techById[a.technician_id], account:a}); });
      orphanTechs.forEach(function(t){ techEntries.push({tech:t, account:null}); });
      techEntries.sort(function(x,y){ return (x.tech.sort-y.tech.sort) || x.tech.name.localeCompare(y.tech.name); });
      var chips=techEntries.map(function(e){ return {key:e.tech.id, label:e.tech.name, render:function(){ return techPersonCard(e.account, e.tech); }}; });
      if(admins.length) chips.push({key:"__admins", label:"Admins", render:function(){ var box=document.createElement("div"); admins.forEach(function(a){ box.appendChild(adminRow(a)); }); return box; }});
      var sec=document.createElement("div"); sec.className="card setup-sec";
      if(!chips.length){ sec.innerHTML='<div class="empty" style="padding:24px">No one yet. Add a technician or admin above.</div>'; list.appendChild(sec); return; }
      if(!chips.some(function(ch){ return ch.key===acctSel; })) acctSel=chips[0].key;
      var nav=document.createElement("div"); nav.className="peoplenav";
      var detail=document.createElement("div");
      function selectChip(key){
        acctSel=key;
        nav.querySelectorAll(".pchip").forEach(function(x){ x.classList.toggle("on", x.dataset.key===key); });
        var ch=chips.filter(function(c){ return c.key===key; })[0]||chips[0];
        detail.innerHTML=""; detail.appendChild(ch.render());
      }
      chips.forEach(function(ch){
        var btn=document.createElement("button"); btn.className="pchip"; btn.type="button"; btn.dataset.key=ch.key; btn.textContent=ch.label;
        btn.onclick=function(){ selectChip(ch.key); };
        nav.appendChild(btn);
      });
      sec.appendChild(nav); sec.appendChild(detail); list.appendChild(sec);
      selectChip(acctSel);
    }
    function acctBadges(a){
      if(!a) return '';
      var locked=a.locked_until && (new Date(a.locked_until).getTime()>Date.now());
      return (a.must_reset?'<span class="badge" style="color:#9a7b25;border:1px solid #e6d9b0">must reset</span>':'')+
        (locked?'<span class="badge off">locked</span>':'')+
        (a.active?'':'<span class="badge off">inactive login</span>');
    }
    // Admin -> compact row. Technician -> full card (details + services/hours/time-off + login controls).
    function personRow(a, t){ return t ? techPersonCard(a, t) : adminRow(a); }
    function adminRow(a){
      var row=document.createElement("div"); row.className="sub"+(a.active?"":" unsub");
      row.innerHTML='<div class="em">'+esc(a.login)+' <span class="badge" style="color:var(--accent);border:1px solid var(--line)">admin</span>'+acctBadges(a)+'</div>'+
        '<div class="rowbtns" style="margin:0"><button class="btn ghost sm a-reset">Reset</button>'+(a.active?'<button class="btn danger a-deact">Deactivate</button>':'')+'<span class="a-rmsg"></span></div>';
      var q=function(s){return row.querySelector(s)};
      q(".a-reset").onclick=function(){ if(!confirm("Reset password for "+a.login+"?"))return; postAdmin("/api/admin/accounts/reset",{id:a.id},q(".a-reset"),q(".a-rmsg"),function(res){ if(res&&res.tempPassword) alert("Temp password for "+a.login+":\n\n"+res.tempPassword+"\n\nShare it securely."); loadAccounts(); }); };
      if(a.active) q(".a-deact").onclick=function(){ if(!confirm("Deactivate "+a.login+"?"))return; postAdmin("/api/admin/accounts/deactivate",{id:a.id},q(".a-deact"),q(".a-rmsg"),function(){ loadAccounts(); }); };
      return row;
    }
    function techPersonCard(a, t){
      var card=document.createElement("div"); card.className="card setup-sec"; if(!t.active) card.style.opacity=".6";
      var loginPart = a
        ? ('<span class="badge" style="color:var(--accent);border:1px solid var(--line)">'+esc(a.login)+'</span>'+acctBadges(a)+'<button class="btn ghost sm p-reset">Reset password</button><button class="btn danger p-rmlogin">Remove login</button>')
        : ('<span class="muted" style="font-size:13px">no login</span><button class="btn ghost sm p-addlogin">Add login</button>');
      card.innerHTML=
        '<div style="padding:16px 16px 4px"><h3>'+esc(t.name)+' <span class="badge" style="color:var(--accent);border:1px solid var(--line)">technician</span>'+(t.active?'':' <span class="badge off">inactive</span>')+'</h3></div>'+
        '<div style="padding:0 16px 16px">'+
          '<div class="fgrid">'+
            '<div class="fld wide"><label>Name</label><input class="t-name" value="'+esc(t.name)+'"></div>'+
            '<div class="fld wide"><label>Short bio</label><input class="t-bio" value="'+esc(t.bio||"")+'"></div>'+
            '<div class="fld"><label>Photo URL (optional)</label><input class="t-photo" value="'+esc(t.photo_url||"")+'"></div>'+
            '<div class="fld"><label>Sort</label><input class="t-sort" type="number" value="'+(t.sort||0)+'"></div>'+
          '</div>'+
          '<div class="rowbtns"><button class="btn t-save">Save</button>'+(t.active?'<button class="btn danger t-del">Deactivate</button>':'<button class="btn ghost sm t-react">Reactivate</button>')+loginPart+'<span class="t-msg"></span></div>'+
          '<div style="margin-top:14px"><label style="font-size:12px;font-weight:600;color:var(--muted)">Services performed <span style="font-weight:400">(none checked = all services)</span></label><div class="t-svcs" style="display:flex;flex-wrap:wrap;gap:6px 14px;margin-top:6px"></div></div>'+
          '<div style="margin-top:14px"><label style="font-size:12px;font-weight:600;color:var(--muted)">Working hours <span style="font-weight:400">(each day follows the studio hours unless you check Custom)</span></label><div class="t-hours"></div></div>'+
          '<div style="margin-top:14px"><label style="font-size:12px;font-weight:600;color:var(--muted)">Time off <span style="font-weight:400">(block a specific day the technician is out -- vacation, day off; not their weekly hours)</span></label><div class="t-off"></div>'+
            '<div class="hrow" style="border:0;padding:8px 0"><input type="date" class="to-date"><input type="time" class="to-start" title="start (optional)"><input type="time" class="to-end" title="end (optional)"><input class="to-reason" placeholder="reason" style="flex:1;min-width:90px;border:1px solid var(--line);border-radius:8px;padding:8px 9px;font:inherit;font-size:14px"><button class="btn ghost sm to-add">Add</button></div>'+
          '</div>'+
        '</div>';
      var q=function(s){return card.querySelector(s)};
      q(".t-save").onclick=function(){ if(!q(".t-name").value.trim()){ setRowMsg(q(".t-msg"),"Name required",true); return; } postAdmin("/api/admin/technician",{id:t.id,name:q(".t-name").value.trim(),bio:q(".t-bio").value.trim()||undefined,photo_url:q(".t-photo").value.trim()||undefined,sort:parseInt(q(".t-sort").value,10)||0,active:!!t.active},q(".t-save"),q(".t-msg"),null); };
      if(q(".t-del")) q(".t-del").onclick=function(){ if(!confirm("Deactivate "+t.name+"? Existing bookings keep their history."))return; postAdmin("/api/admin/technician/delete",{id:t.id},q(".t-del"),q(".t-msg"),function(){ loadAccounts(); }); };
      if(q(".t-react")) q(".t-react").onclick=function(){ postAdmin("/api/admin/technician",{id:t.id,name:t.name,bio:t.bio,photo_url:t.photo_url,sort:t.sort,active:true},q(".t-react"),q(".t-msg"),function(){ loadAccounts(); }); };
      if(q(".p-reset")) q(".p-reset").onclick=function(){ if(!confirm("Reset "+a.login+"'s password?"))return; postAdmin("/api/admin/accounts/reset",{id:a.id},q(".p-reset"),q(".t-msg"),function(res){ if(res&&res.tempPassword) alert("Temp password for "+a.login+":\n\n"+res.tempPassword+"\n\nShare it securely."); loadAccounts(); }); };
      if(q(".p-rmlogin")) q(".p-rmlogin").onclick=function(){ if(!confirm("Remove "+a.login+"'s login? The technician stays; they just can't sign in."))return; postAdmin("/api/admin/accounts/deactivate",{id:a.id},q(".p-rmlogin"),q(".t-msg"),function(){ loadAccounts(); }); };
      if(q(".p-addlogin")) q(".p-addlogin").onclick=function(){ var email=prompt("Email for "+t.name+"'s login:"); if(!email) return; postAdmin("/api/admin/accounts",{login:email.trim(),role:"technician",technician_id:t.id},q(".p-addlogin"),q(".t-msg"),function(res){ if(res&&res.tempPassword) alert("Login created for "+t.name+"\n\nEmail: "+res.login+"\nTemp password: "+res.tempPassword+"\n\nThey set their own on first sign-in."); loadAccounts(); }); };
      var svcWrap=q(".t-svcs");
      ALLSERVICES.forEach(function(s){ var checked=(t.service_ids||[]).indexOf(s.id)>=0; var lbl=document.createElement("label"); lbl.style.cssText="display:flex;gap:5px;align-items:center;font-size:13px;color:var(--ink)"; lbl.innerHTML='<input type="checkbox" value="'+esc(s.id)+'"'+(checked?' checked':'')+'> '+esc(s.label); svcWrap.appendChild(lbl); });
      svcWrap.addEventListener("change",function(){ var ids=[]; svcWrap.querySelectorAll("input:checked").forEach(function(x){ ids.push(x.value); }); postAdmin("/api/admin/technician/services",{id:t.id,service_ids:ids},q(".t-save"),q(".t-msg"),null); });
      var hoursWrap=q(".t-hours"); for(var wd=0; wd<=6; wd++) hoursWrap.appendChild(techHoursRow(t, wd));
      var offWrap=q(".t-off"); (t.timeoff||[]).forEach(function(o){ offWrap.appendChild(techOffRow(t,o)); });
      q(".to-add").onclick=function(){ var d=q(".to-date").value; if(!d){ setRowMsg(q(".t-msg"),"Pick a date for time off",true); return; } var payload={id:t.id,date:d,reason:q(".to-reason").value.trim()||undefined}; if(q(".to-start").value) payload.start_min=timeToMin(q(".to-start").value); if(q(".to-end").value) payload.end_min=timeToMin(q(".to-end").value); postAdmin("/api/admin/technician/timeoff",payload,q(".to-add"),q(".t-msg"),function(){ loadAccounts(); }); };
      return card;
    }
    function techHoursRow(t, wd){
      var custom=t.hours&&t.hours[wd]; var open=custom?t.hours[wd][0]:null, close=custom?t.hours[wd][1]:null;
      var customClosed=custom&&(open==null||close==null);
      var sh=STUDIOHOURS[wd];
      var shOpen=(sh&&sh[0]!=null)?minToTime(sh[0]):"", shClose=(sh&&sh[1]!=null)?minToTime(sh[1]):"", studioClosed=!(sh&&sh[0]!=null&&sh[1]!=null);
      // Not custom -> show the STUDIO hours, greyed out. Custom -> the tech's own values, editable.
      var vOpen=custom?(customClosed?"":minToTime(open)):shOpen, vClose=custom?(customClosed?"":minToTime(close)):shClose, vClosed=custom?customClosed:studioClosed;
      var timeDis=(!custom||vClosed)?' disabled':'';
      var row=document.createElement("div"); row.className="hrow"; row.style.padding="7px 0"; row.style.border="0";
      row.innerHTML='<span style="flex:0 0 42px;font-weight:600;font-size:14px">'+DOWSHORT[wd]+'</span>'+
        '<label class="cl" style="margin:0;flex:0 0 auto"><input type="checkbox" class="h-custom"'+(custom?' checked':'')+'> Custom</label>'+
        '<input type="time" class="h-open" value="'+vOpen+'"'+timeDis+'><span class="muted">to</span>'+
        '<input type="time" class="h-close" value="'+vClose+'"'+timeDis+'>'+
        '<label class="cl" style="margin:0"><input type="checkbox" class="h-closed"'+(vClosed?' checked':'')+(custom?'':' disabled')+'> Off</label>'+
        '<button class="btn ghost sm h-save" style="margin-left:auto">Save</button><span class="h-msg"></span>';
      var q=function(s){return row.querySelector(s)};
      q(".h-custom").onchange=function(){
        if(q(".h-custom").checked){
          q(".h-closed").disabled=false; var cl=q(".h-closed").checked;
          q(".h-open").disabled=cl; q(".h-close").disabled=cl;
        } else { // revert to studio hours, greyed out
          q(".h-open").value=shOpen; q(".h-close").value=shClose; q(".h-closed").checked=studioClosed;
          q(".h-open").disabled=true; q(".h-close").disabled=true; q(".h-closed").disabled=true;
        }
      };
      q(".h-closed").onchange=function(){ if(q(".h-custom").checked){ var cl=q(".h-closed").checked; q(".h-open").disabled=cl; q(".h-close").disabled=cl; } };
      q(".h-save").onclick=function(){
        if(!q(".h-custom").checked){ postAdmin("/api/admin/technician/hours",{id:t.id,weekday:wd,inherit:true},q(".h-save"),q(".h-msg"),null); return; }
        if(q(".h-closed").checked){ postAdmin("/api/admin/technician/hours",{id:t.id,weekday:wd,closed:true},q(".h-save"),q(".h-msg"),null); return; }
        if(!q(".h-open").value||!q(".h-close").value){ setRowMsg(q(".h-msg"),"Set times",true); return; }
        postAdmin("/api/admin/technician/hours",{id:t.id,weekday:wd,open_min:timeToMin(q(".h-open").value),close_min:timeToMin(q(".h-close").value)},q(".h-save"),q(".h-msg"),null);
      };
      return row;
    }
    function techOffRow(t,o){
      var row=document.createElement("div"); row.className="sub"; row.style.padding="8px 0";
      var when=o.date+((o.start_min!=null&&o.end_min!=null)?(" "+minLabel(o.start_min)+"-"+minLabel(o.end_min)):" (all day)");
      row.innerHTML='<div class="em" style="font-weight:500;font-size:13px">'+esc(when)+(o.reason?(' <span class="muted">- '+esc(o.reason)+'</span>'):'')+'</div><button class="btn ghost sm o-del">Remove</button>';
      row.querySelector(".o-del").onclick=function(){ postAdmin("/api/admin/technician/timeoff/delete",{timeoff_id:o.id},row.querySelector(".o-del"),null,function(){ loadAccounts(); }); };
      return row;
    }
    el("tabBookings").onclick=function(){ showTab("bookings"); };
    el("tabSignups").onclick=function(){ showTab("signups"); };
    el("tabSetup").onclick=function(){ showTab("setup"); };
    el("tabAccounts").onclick=function(){ showTab("accounts"); };
    el("tabPromos").onclick=function(){ showTab("promos"); };
    el("subCsv").onclick=function(){ downloadCsv(); };
    el("refreshBtn").onclick=function(){
      if(curTab==="bookings") load(el("dateFilter").value||undefined);
      else if(curTab==="signups") loadSubs();
      else if(curTab==="setup") loadSetup();
      else if(curTab==="promos") loadPromos();
      else loadAccounts();
    };

    el("loadBtn").onclick=function(){ load(el("dateFilter").value||undefined); };
    el("dateFilter").onchange=function(){ load(el("dateFilter").value||undefined); };
    el("upcoming").onclick=function(){ el("dateFilter").value=""; load(); };
    el("signout").onclick=function(){
      if(cookieAuth){ fetch(api()+"/api/auth/logout",{method:"POST",credentials:"include"}).catch(function(){}); cookieAuth=false; }
      localStorage.removeItem("lb_token"); el("token").value="";
      el("cfg").classList.remove("hide"); el("tabs").classList.add("hide");
      ["toolbar","subToolbar","setupToolbar","acctToolbar","promoToolbar"].forEach(function(t){ el(t).classList.add("hide"); });
      el("list").innerHTML=""; setMsg("");
      el("cfgMsg").textContent="Signed out."; el("cfgMsg").style.color="var(--muted)";
    };

    // On load: if an admin session cookie is present, auto-connect (no token needed).
    // Otherwise fall back to a saved break-glass token, else wait for sign-in.
    (function init(){
      if(!api()){ return; }
      fetch(api()+"/api/auth/me",{credentials:"include"}).then(function(r){ return r.ok?r.json():null; }).then(function(me){
        if(me && me.role==="admin"){ cookieAuth=true; load(); }
        else if(tok()){ load(); }
      }).catch(function(){ if(tok()) load(); });
    })();
  })();
  </script>
</body>
</html>
