{{- $s := site.Data.studio -}}
<!DOCTYPE html>
<html lang="{{ site.LanguageCode | default "en-us" }}">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Page not found - {{ $s.name | default site.Title }}</title>
  <meta name="robots" content="noindex">
  <link rel="icon" href="/favicon.ico">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600&family=Inter:wght@400;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --accent: #8a6f57; --ink: #2e2823; --muted: #8a7f72;
      --serif: "Cormorant Garamond", Georgia, serif;
      --sans: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: var(--sans); color: var(--ink);
      background: linear-gradient(180deg, #f6efe7 0%, #e9ddcf 100%);
      min-height: 100vh; display: flex; align-items: center; justify-content: center;
      text-align: center; padding: 24px;
    }
    .code { font-family: var(--serif); font-size: 88px; font-weight: 600; color: var(--accent); line-height: 1; }
    h1 { font-family: var(--serif); font-size: 30px; font-weight: 600; margin: 12px 0 8px; }
    p { color: var(--muted); font-size: 15px; margin-bottom: 24px; }
    a.btn {
      display: inline-block; padding: 13px 26px; background: var(--accent);
      color: #fffaf3; text-decoration: none; border-radius: 999px; font-weight: 600; font-size: 15px;
    }
    a.btn:hover { opacity: .92; }
  </style>
</head>
<body>
  <main>
    <div class="code">404</div>
    <h1>Page not found</h1>
    <p>The page you're looking for doesn't exist.</p>
    <a class="btn" href="/">Back to home</a>
  </main>
</body>
</html>
