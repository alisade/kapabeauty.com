# -----------------------------------------------------------------------------
# La Belle Nail Studio - single source of truth for the landing page.
# Edit this file to change anything on the home page. No HTML required.
# -----------------------------------------------------------------------------

name: "La Belle Nail Studio"
tagline: "Premium nail care & artistry"
bio: "Russian & e-file manicures, gel, and custom nail art in Los Angeles, CA. Book your appointment online."

# Wide cover banner across the very top (like a Fresha cover photo).
# Drop a wide image at static/images/banner.jpg and set it below, e.g.
# banner: "/images/banner.jpg". Leave blank for an elegant gradient banner.
banner: ""

# Avatar shown at the top, overlapping the banner. Drop an image at
# static/images/logo.png (square works best). Leave blank for the initials.
avatar: ""
initials: "LB"

# Rating badge (from your Fresha / Google reviews).
rating: "4.9"
reviewCount: "1664"

# Contact / location.
address: "17804 Chatsworth Street, Los Angeles, CA 91344"
mapsURL: "https://www.google.com/maps/search/?api=1&query=La+Belle+Nail+Studio+Los+Angeles"
phone: "+1 (555) 123-6245"
email: "hello@labellenailstudio.com"
instagram: "https://instagram.com/labellenailstudio"

# ---------------------------------------------------------------------------
# Booking. The site has an on-site /book/ page that EMBEDS your booking
# provider in an iframe. To make it work:
#   1. bookingEmbedURL: paste your provider's embeddable booking URL. Providers
#      that embed cleanly: Square Appointments (free), Acuity, Setmore.
#        Square example: https://squareup.com/appointments/book/XXXXXXXX/start
#      Leave blank and the /book page shows a fallback link to bookingHostedURL.
#   2. bookingURL: where every "Book" button points. Keep "/book/" for the
#      on-site embedded page, or set an external URL to link straight out.
#   3. bookingHostedURL: a hosted booking page to link out to (used as the
#      fallback on /book until you set bookingEmbedURL). Your Fresha link fits
#      here since Fresha only supports link-out, not embedding.
# ---------------------------------------------------------------------------
bookingEmbedURL: ""
bookingURL: "/book/"
bookingHostedURL: "https://www.fresha.com/"

# -----------------------------------------------------------------------------
# Link-in-bio buttons (Linktree style). Order top to bottom.
# Set primary: true on the one that should stand out (filled accent color).
# -----------------------------------------------------------------------------
links:
  - label: "Book online"
    url: "/book/"
    icon: "calendar"
    primary: true
  - label: "Gift Card"
    url: "https://squareup.com/gift"
    icon: "gift"
  - label: "Follow on Instagram"
    url: "https://instagram.com/labellenailstudio"
    icon: "instagram"
  - label: "Nail Technician Application"
    url: "#"
    icon: "briefcase"
  - label: "Get Directions"
    url: "https://www.google.com/maps/search/?api=1&query=La+Belle+Nail+Studio+Los+Angeles"
    icon: "pin"

# -----------------------------------------------------------------------------
# Service menu (Fresha style). Grouped by category.
# duration and price are free text so you can write "from $90", "1 hr 45 min", etc.
# -----------------------------------------------------------------------------
categories:
  - name: "Manicures"
    services:
      - name: "Structured Gel / Hard Gel Manicure"
        desc: "Short & medium length"
        duration: "1 hr 45 min"
        price: "from $90"
      - name: "Rubber Base Gel Polish Manicure"
        desc: "Long-lasting, chip-resistant shine"
        duration: "1 hr 30 min"
        price: "$75"
      - name: "Russian / E-file Manicure"
        desc: "Precision cuticle work, clean finish"
        duration: "1 hr 15 min"
        price: "$60"
      - name: "Classic Manicure"
        desc: "Shape, cuticle care, polish"
        duration: "45 min"
        price: "$35"

  - name: "Pedicures"
    services:
      - name: "Soft Gel Pedicure"
        desc: "Gel polish, extended massage"
        duration: "1 hr"
        price: "$65"
      - name: "Luxury Spa Pedicure"
        desc: "Exfoliation, callus care, massage"
        duration: "1 hr 15 min"
        price: "$70"
      - name: "Classic Pedicure"
        desc: "Soak, shape, polish"
        duration: "1 hr"
        price: "$45"

  - name: "Nail Art & Add-ons"
    services:
      - name: "French"
        desc: "Classic or modern tips"
        duration: "15 min"
        price: "$20"
      - name: "Custom Nail Art"
        desc: "Per nail, varies by design"
        duration: "15 min+"
        price: "from $5"
      - name: "Gel Removal & Repair"
        desc: "Safe soak-off and nail repair"
        duration: "30 min"
        price: "$20"

